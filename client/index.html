<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#131313" />
    <meta name="description" content="SPORT LOUNGE — премиальная кальянная и лаунж-клуб" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sport Lounge" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&family=Geist:wght@300..900&family=JetBrains+Mono:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <title>SPORT LOUNGE</title>
    <style>
      body {
        background-color: #131313;
        margin: 0;
        padding: 0;
      }
    </style>
    <script>
      window.addEventListener('error', function(e) {
        var errDiv = document.getElementById('runtime-error-banner') || document.createElement('div');
        errDiv.id = 'runtime-error-banner';
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0';
        errDiv.style.left = '0';
        errDiv.style.right = '0';
        errDiv.style.zIndex = '99999';
        errDiv.style.background = '#800000';
        errDiv.style.color = '#fff';
        errDiv.style.padding = '15px';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.fontSize = '12px';
        errDiv.style.borderBottom = '2px solid #ffcc00';
        errDiv.innerHTML = '<strong>[Runtime Error]:</strong> ' + e.message + ' at ' + e.filename + ':' + e.lineno + ':' + e.colno;
        document.body.appendChild(errDiv);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var errDiv = document.getElementById('runtime-error-banner') || document.createElement('div');
        errDiv.id = 'runtime-error-banner';
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0';
        errDiv.style.left = '0';
        errDiv.style.right = '0';
        errDiv.style.zIndex = '99999';
        errDiv.style.background = '#800000';
        errDiv.style.color = '#fff';
        errDiv.style.padding = '15px';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.fontSize = '12px';
        errDiv.style.borderBottom = '2px solid #ffcc00';
        errDiv.innerHTML = '<strong>[Promise Rejection]:</strong> ' + (e.reason ? e.reason.message || e.reason : 'Unknown reason');
        document.body.appendChild(errDiv);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

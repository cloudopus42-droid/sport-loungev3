<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1815" />
    <meta name="description" content="SPORT LOUNGE — премиальная кальянная и лаунж-клуб в Чебоксарах. Авторские миксы, работаем круглосуточно 24/7." />
    <meta property="og:title" content="SPORT LOUNGE — премиальная кальянная 24/7" />
    <meta property="og:description" content="Авторские кальяны, конструктор вкусов и заказ прямо за стол. Г. Чебоксары, ул. Гагарина 40А." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/sport-loungev3/images/hero-poster.png" />
    <link rel="manifest" href="/sport-loungev3/manifest.json" />
    
    <!-- iOS support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sport Lounge" />
    <link rel="apple-touch-icon" href="/sport-loungev3/icon-192.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <title>SPORT LOUNGE</title>
    <style>
      body {
        background-color: #1a1815;
        margin: 0;
        padding: 0;
      }
    </style>
    <script>
      window.addEventListener('error', function(e) {
        var errDiv = document.getElementById('runtime-error-banner') || document.createElement('div');
        errDiv.id = 'runtime-error-banner';
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0';
        errDiv.style.left = '0';
        errDiv.style.right = '0';
        errDiv.style.zIndex = '99999';
        errDiv.style.background = '#800000';
        errDiv.style.color = '#fff';
        errDiv.style.padding = '15px';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.fontSize = '12px';
        errDiv.style.borderBottom = '2px solid #ffcc00';
        errDiv.innerHTML = '<strong>[Runtime Error]:</strong> ' + e.message + ' at ' + e.filename + ':' + e.lineno + ':' + e.colno;
        document.body.appendChild(errDiv);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var errDiv = document.getElementById('runtime-error-banner') || document.createElement('div');
        errDiv.id = 'runtime-error-banner';
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0';
        errDiv.style.left = '0';
        errDiv.style.right = '0';
        errDiv.style.zIndex = '99999';
        errDiv.style.background = '#800000';
        errDiv.style.color = '#fff';
        errDiv.style.padding = '15px';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.fontSize = '12px';
        errDiv.style.borderBottom = '2px solid #ffcc00';
        errDiv.innerHTML = '<strong>[Promise Rejection]:</strong> ' + (e.reason ? e.reason.message || e.reason : 'Unknown reason');
        document.body.appendChild(errDiv);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

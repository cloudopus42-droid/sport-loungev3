name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Build
        run: cd client && npm run build

      - name: SPA fallback
        run: cp client/dist/index.html client/dist/404.html

      - name: Inject deploy timestamp for cache busting
        run: |
          TIMESTAMP=$(date +%s)
          sed -i "s|</head>|<meta name=\"x-deploy\" content=\"$TIMESTAMP\"></head>|" client/dist/index.html
          sed -i "s|</head>|<meta name=\"x-deploy\" content=\"$TIMESTAMP\"></head>|" client/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: client/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Keep Render Alive (Frequent)
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Quick ping
        run: curl -s -m 60 "https://sport-loungev3.onrender.com/api/health" > /dev/null 2>&1 || true

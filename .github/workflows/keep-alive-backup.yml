name: Keep Render Alive (Backup)
on:
  schedule:
    - cron: '3,23,43 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Wake up Render
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}" --max-time 45 \
            "https://sport-loungev3.onrender.com/api/health" || true
          echo ""

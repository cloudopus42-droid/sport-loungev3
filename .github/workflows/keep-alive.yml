name: Keep Render Alive (Primary)
on:
  schedule:
    - cron: '*/8 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping with retry
        run: |
          URL="https://sport-loungev3.onrender.com/api/health"
          MAX_RETRIES=3
          RETRY_DELAY=15

          for i in $(seq 1 $MAX_RETRIES); do
            RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 60 "$URL" 2>/dev/null)
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            
            echo "Attempt $i: HTTP $HTTP_CODE"
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Render is alive"
              echo "$BODY" | head -c 200
              echo ""
              exit 0
            fi
            
            if [ $i -lt $MAX_RETRIES ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done
          
          echo "⚠️ All attempts failed, but workflow won't block"
          exit 0
